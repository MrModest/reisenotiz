services:
  app:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        # Set in a root .env file, then `docker compose build app`. Baked in at build time (Vite).
        VITE_SYNC_SERVER_URL: ${VITE_SYNC_SERVER_URL:-}
    image: ghcr.io/mrmodest/reisenotiz-client:edge-amd64 # change to `edge-arm64` for ARM64
    ports:
      - '8080:8080'
    # Uncomment to run with custom UID/GID
    # user: "1000:1000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  sync:
    build:
      context: ./apps/sync
      dockerfile: Dockerfile
    image: ghcr.io/mrmodest/reisenotiz-sync:edge-amd64 # change to `edge-arm64` for ARM64
    environment:
      - SYNC_PORT=4000
      - SYNC_HOST=0.0.0.0
      - SYNC_DB_KIND=sqlite
      - SYNC_SQLITE_PATH=/data/sync.db
      # Switch to Postgres by setting:
      # - SYNC_DB_KIND=postgres
      # - SYNC_PG_URL=postgres://user:pass@host:5432/db
    ports:
      - '4000:4000'
    volumes:
      - sync-data:/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  sync-data:
