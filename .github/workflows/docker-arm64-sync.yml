name: Build and Push Docker Image - Sync (arm64)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'apps/sync/**'
      - '.github/workflows/_docker-build.yml'
      - '.github/workflows/docker-arm64-sync.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/sync/**'
      - '.github/workflows/_docker-build.yml'
      - '.github/workflows/docker-arm64-sync.yml'

jobs:
  build:
    uses: ./.github/workflows/_docker-build.yml
    permissions:
      contents: read
      packages: write
    with:
      app: sync
      platform: linux/arm64
      runner: ubuntu-24.04-arm
      image: ghcr.io/${{ github.repository_owner }}/reisenotiz-sync
      tag-suffix: -arm64
